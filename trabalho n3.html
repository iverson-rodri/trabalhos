<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalho N3</title>
    
    
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
}
.container {
  text-align: center;
}
        body {
        font-family: "Times New Roman", Times, serif;
        background-color: #7d7878;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center; 
        justify-content: center;
        min-height: 100vh;
    }
        form {
            max-width: 400px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            margin-right: 10px;
        }
        body{
            background-color: #bfbaba;
        }
    </style>
</head>
<body>
    <h1 id="titulo">Simulador de média semestral</h1>

    <form id="N1">
        <label>Atividade N1:</label>
        <input type="number" id="atividaden1" oninput="validarNota(this)" required>

        <label>Prova N1:</label>
        <input type="number" id="provan1" oninput="validarNota(this)" required>
	<!--preciso fazer o cáculo da N1 -->

        <label>Prova N2:</label>
        <input type="number" id="provan2" oninput="validarNota(this)" required>
        <label>Atividade N3:</label>
        <input type="number" id="atividaden3" oninput="validarNota(this)" required>
        <label>Prova N3:</label>
        <input type="number" id="provan3" oninput="validarNota(this)" required>
        <button type="button" onclick="ConsultarMédiaSemestral()">Consultar</button>

    </form>

    <br><br>

    <h3 id="mostrar"></h3>
    <div id="container-foto"></div>

   

    
    <script src="https://rawcdn.githack.com/iverson-rodri/trabalhos/refs/heads/main/javascript%20n3.js"></script>

    <h4> 
        <span style="color: rgb(58, 4, 235);">Desenvolvido por: Iverson Rodrigues de Barros</span>
        </h4>

</html>
